<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Team priorities</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/3.1.0/iconfont/tabler-icons.min.css">
<style>
  :root {
    --bg: #FAF9F6;
    --surface: #FFFFFF;
    --border: rgba(40, 40, 38, 0.12);
    --border-strong: rgba(40, 40, 38, 0.22);
    --text: #28281F;
    --text-secondary: #6B6A60;
    --accent: #3C3489;
    --accent-bg: #EEEDFE;
    --green: #27500A;
    --green-bg: #EAF3DE;
    --amber: #633806;
    --amber-bg: #FAEEDA;
    --red: #791F1F;
    --red-bg: #FCEBEB;
    --gray: #444441;
    --gray-bg: #F1EFE8;
    --radius-md: 8px;
    --radius-lg: 12px;
    --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --font-serif: "Iowan Old Style", "Georgia", serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1C1B17;
      --surface: #26241F;
      --border: rgba(255,255,255,0.10);
      --border-strong: rgba(255,255,255,0.18);
      --text: #F1EFE8;
      --text-secondary: #B4B2A9;
      --accent: #AFA9EC;
      --accent-bg: #3C3489;
      --green: #97C459;
      --green-bg: #27500A;
      --amber: #FAC775;
      --amber-bg: #633806;
      --red: #F09595;
      --red-bg: #791F1F;
      --gray: #D3D1C7;
      --gray-bg: #444441;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-sans);
    line-height: 1.6;
  }
  .wrap {
    max-width: 1000px;
    margin: 0 auto;
    padding: 2.5rem 1.5rem 4rem;
  }
  header {
    margin-bottom: 2rem;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 0.5rem;
  }
  h1 {
    font-family: var(--font-serif);
    font-weight: 600;
    font-size: 2rem;
    margin: 0;
    letter-spacing: -0.01em;
  }
  .eyebrow {
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-secondary);
    margin: 0 0 0.35rem;
  }
  .sync-status {
    font-size: 0.85rem;
    color: var(--text-secondary);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .sync-status.error { color: var(--red); }
  .sync-status .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--green);
  }
  .sync-status.error .dot { background: var(--red); }
  .sync-status.syncing .dot { background: var(--amber); }

  section { margin-bottom: 2.5rem; }
  h2 {
    font-family: var(--font-serif);
    font-size: 1.25rem;
    font-weight: 600;
    margin: 0 0 1rem;
  }

  .priorities-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 1rem;
  }
  .priority-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.1rem 1.25rem;
  }
  .priority-card .name {
    font-weight: 600;
    font-size: 1rem;
    margin: 0 0 0.6rem;
  }
  .priority-row {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 6px;
  }
  .priority-row .num {
    font-size: 0.8rem;
    color: var(--text-secondary);
    min-width: 16px;
  }

  input[type=text], input[type=date], select, textarea {
    font-family: var(--font-sans);
    font-size: 0.875rem;
    color: var(--text);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 6px 10px;
    height: 34px;
  }
  textarea { height: auto; padding: 8px 10px; resize: vertical; }
  input:focus, select:focus, textarea:focus {
    outline: 2px solid var(--accent);
    outline-offset: 1px;
    border-color: var(--accent);
  }
  input[type=text] { width: 100%; }

  button {
    font-family: var(--font-sans);
    font-size: 0.875rem;
    background: transparent;
    border: 1px solid var(--border-strong);
    border-radius: var(--radius-md);
    padding: 6px 12px;
    height: 34px;
    color: var(--text);
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  button:hover { background: var(--gray-bg); }
  button:active { transform: scale(0.98); }
  button:focus-visible { outline: 2px solid var(--accent); outline-offset: 1px; }
  button.icon-btn {
    width: 34px; padding: 0; justify-content: center; flex-shrink: 0;
  }
  button.danger { color: var(--red); border-color: var(--red); }

  .toolbar {
    display: flex;
    gap: 8px;
    margin-bottom: 1rem;
    flex-wrap: wrap;
  }
  .toolbar input[type=text] { flex: 1; min-width: 140px; }
  .toolbar select { width: auto; }

  .deal-list { display: flex; flex-direction: column; gap: 8px; }
  .deal-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
  }
  .deal-card.stale { border-color: var(--red); }
  .deal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    padding: 0.75rem 1rem;
    cursor: pointer;
  }
  .deal-header-left {
    display: flex; align-items: center; gap: 10px; min-width: 0; flex: 1;
  }
  .deal-header-left .chev {
    transition: transform 0.15s; flex-shrink: 0; font-size: 1rem;
  }
  .deal-card.open .chev { transform: rotate(0deg); }
  .deal-card:not(.open) .chev { transform: rotate(-90deg); }
  .deal-name {
    font-weight: 600; font-size: 0.95rem;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .deal-owner { font-size: 0.8rem; color: var(--text-secondary); flex-shrink: 0; }
  .deal-header-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .deal-date { font-size: 0.8rem; color: var(--text-secondary); }

  .badge {
    font-size: 0.75rem;
    padding: 2px 10px;
    border-radius: var(--radius-md);
    font-weight: 500;
  }
  .badge.on-track { background: var(--green-bg); color: var(--green); }
  .badge.at-risk { background: var(--amber-bg); color: var(--amber); }
  .badge.blocked { background: var(--red-bg); color: var(--red); }
  .badge.closed { background: var(--gray-bg); color: var(--gray); }
  .badge.stale { background: var(--red-bg); color: var(--red); display: inline-flex; align-items: center; gap: 4px; }

  .deal-body {
    padding: 0 1rem 1rem;
    border-top: 1px solid var(--border);
    padding-top: 0.75rem;
  }
  .field-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 8px;
  }
  .field-grid select, .field-grid input { width: 100%; }
  label {
    font-size: 0.75rem;
    color: var(--text-secondary);
    display: block;
    margin-bottom: 4px;
  }
  textarea { width: 100%; min-height: 60px; margin-bottom: 8px; }
  .stale-note {
    font-size: 0.8rem; color: var(--red); margin: 0 0 8px;
    display: flex; align-items: center; gap: 4px;
  }

  .empty {
    color: var(--text-secondary);
    font-size: 0.9rem;
    padding: 1.5rem;
    text-align: center;
    border: 1px dashed var(--border-strong);
    border-radius: var(--radius-lg);
  }

  .setup-banner {
    background: var(--accent-bg);
    color: var(--accent);
    border-radius: var(--radius-lg);
    padding: 1rem 1.25rem;
    font-size: 0.875rem;
    margin-bottom: 1.5rem;
  }
  .setup-banner code {
    font-family: var(--font-sans);
    background: rgba(0,0,0,0.06);
    padding: 1px 5px;
    border-radius: 4px;
  }
  .setup-banner a { color: var(--accent); text-decoration: underline; }

  @media (max-width: 600px) {
    .field-grid { grid-template-columns: 1fr; }
    .deal-date { display: none; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <p class="eyebrow">Internal · updated live</p>
      <h1>Team priorities</h1>
    </div>
    <div class="sync-status" id="syncStatus">
      <button id="changeSheetBtn">Change Sheet</button>
      <span class="dot"></span><span id="syncLabel">Connecting...</span></div>
  </header>

  <div id="setupBanner" class="setup-banner" style="display:none;">
    <strong>One-time setup needed.</strong> Connect this dashboard to your Google Sheet so everyone shares the same data.
    <div style="display:flex; gap:8px; margin-top:10px; flex-wrap:wrap;">
      <input type="text" id="scriptUrlInput" placeholder="Paste your Apps Script web app URL here" style="flex:1; min-width:220px;" />
      <button id="saveScriptUrlBtn">Save</button>
    </div>
    <p style="margin:8px 0 0; font-size:0.8rem;">Until this is set, data saves only to this browser. See SETUP.md for how to get this URL.</p>
  </div>

  <section>
    <h2>Priorities by team member</h2>
    <div class="priorities-grid" id="prioritiesGrid"></div>
  </section>

  <section>
    <h2>Deal directory</h2>
    <div class="toolbar">
      <input type="text" id="search" placeholder="Search deals..." />
      <select id="stageFilter">
        <option>All</option>
        <option>On track</option>
        <option>At risk</option>
        <option>Blocked</option>
        <option>Closed</option>
      </select>
      <select id="sortBy">
        <option value="date_desc">Newest first</option>
        <option value="date_asc">Oldest first</option>
        <option value="name">Name (A-Z)</option>
        <option value="owner">Owner (A-Z)</option>
      </select>
      <button id="addDealBtn"><i class="ti ti-plus" aria-hidden="true"></i>Add deal</button>
      <button id="exportBtn"><i class="ti ti-download" aria-hidden="true"></i>Export</button>
    </div>
    <div class="deal-list" id="dealList"></div>
  </section>
</div>

<script>
/* =========================================================
   CONFIGURATION
   The Apps Script web app URL is stored in this browser's
   localStorage (set via the setup banner on first run), or
   you can hardcode a default below so every visitor is
   pre-connected without needing to paste anything.
   ========================================================= */
const DEFAULT_SCRIPT_URL = '';
let SCRIPT_URL = localStorage.getItem('team-priorities-script-url') || DEFAULT_SCRIPT_URL;

const TEAM = ['Kate', 'Dave', 'Abby', 'Ben'];
const STAGES = ['On track', 'At risk', 'Blocked', 'Closed'];
const STAGE_CLASS = {
  'On track': 'on-track',
  'At risk': 'at-risk',
  'Blocked': 'blocked',
  'Closed': 'closed'
};
const STALE_DAYS = 7;
const LOCAL_KEY = 'team-priorities-dashboard';

let priorities = {};
let deals = [];
let search = '';
let stageFilter = 'All';
let sortBy = 'date_desc';
let expanded = null;
let saveTimer = null;

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function setSyncStatus(state, label) {
  const el = document.getElementById('syncStatus');
  el.className = 'sync-status ' + state;
  document.getElementById('syncLabel').textContent = label;
}

async function loadData() {
  if (!SCRIPT_URL) {
    document.getElementById('setupBanner').style.display = 'block';
    const local = localStorage.getItem(LOCAL_KEY);
    if (local) {
      const data = JSON.parse(local);
      priorities = data.priorities || {};
      deals = data.deals || [];
    }
    setSyncStatus('error', 'Local only (no Sheet connected)');
    seedDefaults();
    render();
    return;
  }

  setSyncStatus('syncing', 'Loading...');
  try {
    const res = await fetch(SCRIPT_URL + '?action=getAll');
    const data = await res.json();
    priorities = data.priorities || {};
    deals = (data.deals || []).map(normalizeDeal);
    setSyncStatus('', 'Synced');
  } catch (err) {
    console.error(err);
    setSyncStatus('error', 'Could not reach Sheet - showing local data');
    const local = localStorage.getItem(LOCAL_KEY);
    if (local) {
      const data = JSON.parse(local);
      priorities = data.priorities || {};
      deals = data.deals || [];
    }
  }
  seedDefaults();
  render();
}

function normalizeDeal(d) {
  return {
    id: d.id || ('d' + Date.now() + Math.random().toString(36).slice(2)),
    name: d.name || '',
    owner: d.owner || TEAM[0],
    stage: d.stage || 'On track',
    update: d.update || '',
    next: d.next || '',
    date: d.date || new Date().toISOString().slice(0,10)
  };
}

function seedDefaults() {
  TEAM.forEach(m => { if (!priorities[m]) priorities[m] = []; });
  if (deals.length === 0) {
    deals = [
      { id: 'd1', name: 'Acme Corp renewal', owner: 'Kate', stage: 'On track', update: 'Contract redline sent, awaiting legal sign-off.', next: 'Follow up with legal by Thursday', date: '2026-06-12' },
      { id: 'd2', name: 'Northwind expansion', owner: 'Dave', stage: 'At risk', update: 'Champion went quiet after pricing call.', next: 'Re-engage champion, loop in VP sponsor', date: '2026-06-10' }
    ];
  }
}

function queueSave() {
  localStorage.setItem(LOCAL_KEY, JSON.stringify({ priorities, deals }));
  if (!SCRIPT_URL) return;
  clearTimeout(saveTimer);
  setSyncStatus('syncing', 'Saving...');
  saveTimer = setTimeout(async () => {
    try {
      await fetch(SCRIPT_URL, {
        method: 'POST',
        body: JSON.stringify({ action: 'saveDeals', deals: deals })
      });
      await fetch(SCRIPT_URL, {
        method: 'POST',
        body: JSON.stringify({ action: 'savePriorities', priorities: priorities })
      });
      setSyncStatus('', 'Synced');
    } catch (err) {
      console.error(err);
      setSyncStatus('error', 'Save failed - retry or check connection');
    }
  }, 600);
}

function daysSince(dateStr) {
  const then = new Date(dateStr);
  const now = new Date();
  return Math.floor((now - then) / (1000*60*60*24));
}

function filteredDeals() {
  let list = deals.filter(d => {
    const q = search.toLowerCase();
    const matchesSearch = !q || d.name.toLowerCase().includes(q) || d.owner.toLowerCase().includes(q) || d.update.toLowerCase().includes(q);
    const matchesStage = stageFilter === 'All' || d.stage === stageFilter;
    return matchesSearch && matchesStage;
  });
  list = list.slice().sort((a,b) => {
    if (sortBy === 'date_desc') return new Date(b.date) - new Date(a.date);
    if (sortBy === 'date_asc') return new Date(a.date) - new Date(b.date);
    if (sortBy === 'name') return a.name.localeCompare(b.name);
    if (sortBy === 'owner') return a.owner.localeCompare(b.owner);
    return 0;
  });
  return list;
}

function exportMarkdown() {
  let md = '# Team priorities\n\n';
  TEAM.forEach(member => {
    md += `## ${member}\n`;
    (priorities[member] || []).forEach((item, idx) => {
      md += `${idx+1}. ${item}\n`;
    });
    md += '\n';
  });
  md += '# Deal directory\n\n';
  deals.slice().sort((a,b) => new Date(b.date) - new Date(a.date)).forEach(d => {
    md += `## ${d.name}\n`;
    md += `- Owner: ${d.owner}\n`;
    md += `- Status: ${d.stage}\n`;
    md += `- Last measured: ${d.date}\n`;
    md += `- Executive update: ${d.update || '(none)'}\n`;
    md += `- Next steps: ${d.next || '(none)'}\n\n`;
  });

  const blob = new Blob([md], { type: 'text/markdown' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'team-priorities.md';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function render() {
  renderPriorities();
  renderDeals();
}

function renderPriorities() {
  const grid = document.getElementById('prioritiesGrid');
  grid.innerHTML = TEAM.map(member => {
    const items = priorities[member] || [];
    const rows = items.map((item, idx) => `
      <div class="priority-row">
        <span class="num">${idx+1}.</span>
        <input type="text" value="${esc(item)}" data-member="${esc(member)}" data-idx="${idx}" class="priority-input" />
        <button class="icon-btn priority-remove" data-member="${esc(member)}" data-idx="${idx}" aria-label="Remove priority"><i class="ti ti-x" aria-hidden="true"></i></button>
      </div>`).join('');
    return `
      <div class="priority-card">
        <p class="name">${esc(member)}</p>
        ${rows}
        <button class="priority-add" data-member="${esc(member)}" style="width:100%; margin-top:4px; justify-content:center;"><i class="ti ti-plus" aria-hidden="true"></i>Add priority</button>
      </div>`;
  }).join('');

  grid.querySelectorAll('.priority-input').forEach(inp => {
    inp.addEventListener('input', e => {
      priorities[e.target.dataset.member][Number(e.target.dataset.idx)] = e.target.value;
      queueSave();
    });
  });
  grid.querySelectorAll('.priority-remove').forEach(btn => {
    btn.addEventListener('click', e => {
      const member = btn.dataset.member;
      priorities[member].splice(Number(btn.dataset.idx), 1);
      queueSave();
      renderPriorities();
    });
  });
  grid.querySelectorAll('.priority-add').forEach(btn => {
    btn.addEventListener('click', () => {
      priorities[btn.dataset.member].push('New priority');
      queueSave();
      renderPriorities();
    });
  });
}

function renderDeals() {
  const list = document.getElementById('dealList');
  const fDeals = filteredDeals();

  if (fDeals.length === 0) {
    list.innerHTML = '<div class="empty">No deals match. Adjust your filters or add a new deal.</div>';
    return;
  }

  list.innerHTML = fDeals.map(d => {
    const isOpen = expanded === d.id;
    const stale = daysSince(d.date) > STALE_DAYS;
    const stageClass = STAGE_CLASS[d.stage] || 'closed';

    let body = '';
    if (isOpen) {
      body = `
        <div class="deal-body">
          ${stale ? `<p class="stale-note"><i class="ti ti-alert-triangle" aria-hidden="true"></i>Not updated in over ${STALE_DAYS} days</p>` : ''}
          <div class="field-grid">
            <div>
              <label>Deal name</label>
              <input type="text" value="${esc(d.name)}" data-field="name" data-id="${d.id}" class="deal-field" />
            </div>
            <div>
              <label>Owner</label>
              <select data-field="owner" data-id="${d.id}" class="deal-field deal-select">
                ${TEAM.map(m => `<option ${d.owner===m?'selected':''}>${esc(m)}</option>`).join('')}
              </select>
            </div>
            <div>
              <label>Status</label>
              <select data-field="stage" data-id="${d.id}" class="deal-field deal-select">
                ${STAGES.map(s => `<option ${d.stage===s?'selected':''}>${esc(s)}</option>`).join('')}
              </select>
            </div>
            <div>
              <label>Last measured</label>
              <input type="date" value="${esc(d.date)}" data-field="date" data-id="${d.id}" class="deal-field deal-select" />
            </div>
          </div>
          <label>Executive update</label>
          <textarea data-field="update" data-id="${d.id}" class="deal-field">${esc(d.update)}</textarea>
          <label>Next steps</label>
          <textarea data-field="next" data-id="${d.id}" class="deal-field">${esc(d.next)}</textarea>
          <button class="danger deal-delete" data-id="${d.id}"><i class="ti ti-trash" aria-hidden="true"></i>Delete deal</button>
        </div>`;
    }

    return `
      <div class="deal-card ${isOpen ? 'open' : ''} ${stale ? 'stale' : ''}" data-id="${d.id}">
        <div class="deal-header deal-toggle" data-id="${d.id}">
          <div class="deal-header-left">
            <i class="ti ti-chevron-down chev" aria-hidden="true"></i>
            <span class="deal-name">${esc(d.name)}</span>
            <span class="deal-owner">${esc(d.owner)}</span>
            ${stale ? `<span class="badge stale"><i class="ti ti-clock" aria-hidden="true"></i>Stale</span>` : ''}
          </div>
          <div class="deal-header-right">
            <span class="deal-date">${esc(d.date)}</span>
            <span class="badge ${stageClass}">${esc(d.stage)}</span>
          </div>
        </div>
        ${body}
      </div>`;
  }).join('');

  list.querySelectorAll('.deal-toggle').forEach(el => {
    el.addEventListener('click', () => {
      const id = el.dataset.id;
      expanded = expanded === id ? null : id;
      renderDeals();
    });
  });
  list.querySelectorAll('.deal-field').forEach(el => {
    const evt = (el.tagName === 'SELECT' || el.type === 'date') ? 'change' : 'input';
    el.addEventListener(evt, e => {
      const d = deals.find(x => x.id === el.dataset.id);
      if (d) d[el.dataset.field] = el.value;
      queueSave();
      if (evt === 'change') renderDeals();
    });
  });
  list.querySelectorAll('.deal-delete').forEach(btn => {
    btn.addEventListener('click', () => {
      deals = deals.filter(x => x.id !== btn.dataset.id);
      if (expanded === btn.dataset.id) expanded = null;
      queueSave();
      renderDeals();
    });
  });
}

document.getElementById('search').addEventListener('input', e => { search = e.target.value; renderDeals(); });
document.getElementById('stageFilter').addEventListener('change', e => { stageFilter = e.target.value; renderDeals(); });
document.getElementById('sortBy').addEventListener('change', e => { sortBy = e.target.value; renderDeals(); });
document.getElementById('exportBtn').addEventListener('click', exportMarkdown);
document.getElementById('addDealBtn').addEventListener('click', () => {
  const id = 'd' + Date.now();
  deals.push({ id, name: 'New deal', owner: TEAM[0], stage: 'On track', update: '', next: '', date: new Date().toISOString().slice(0,10) });
  expanded = id;
  queueSave();
  renderDeals();
});

document.getElementById('saveScriptUrlBtn').addEventListener('click', async () => {
  const val = document.getElementById('scriptUrlInput').value.trim();

  if (!val) return;

  try {
    const res = await fetch(val + '?action=getAll');

    if (!res.ok) {
      throw new Error('Invalid Apps Script URL');
    }

    await res.json();

    localStorage.setItem('team-priorities-script-url', val);
    SCRIPT_URL = val;

    document.getElementById('setupBanner').style.display = 'none';

    loadData();

  } catch (err) {
    alert(
      'Could not connect to that Google Sheet URL. Please check the Apps Script deployment and try again.'
    );

    document.getElementById('setupBanner').style.display = 'block';
    document.getElementById('scriptUrlInput').focus();
  }
});
document.getElementById('changeSheetBtn').addEventListener('click', () => {
    localStorage.removeItem('team-priorities-script-url');

    SCRIPT_URL = '';

    document.getElementById('setupBanner').style.display = 'block';

    document.getElementById('scriptUrlInput').value = '';

    setSyncStatus('error', 'Local only (no Sheet connected)');
});
loadData();
</script>
</body>
</html>
